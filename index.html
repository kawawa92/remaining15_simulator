<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>残り9試合シミュレーター</title>
<style>
body {
  font-family: sans-serif;
  padding: 10px;
  background: #f7f7f7;
  color: #222;
}

.wrap {
  max-width: 1000px;
  margin: 0 auto;
}

.box {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
}

.rowFlex {
  display: flex;
  gap: 12px;
}

.field {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.field label {
  font-size: 12px;
  font-weight: bold;
}

input[type="number"], select {
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
  box-sizing: border-box;
}

.boardBox {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
}

.boardRow {
  display: flex;
  gap: 8px;
  justify-content: flex-start;
}

.boardDivider {
  border-top: 2px solid #cbd5e1;
  margin: 10px 0;
}

.cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  width: 56px;
}

select.gameSelect {
  width: 52px;
  font-size: 13px;
  padding: 6px 2px;
  text-align: center;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  background-image: none;
  background-color: #f3f4f6;
  color: #666;
  font-weight: bold;
}

select.gameSelect.win {
  background: #dbeafe;
  color: #1d4ed8;
  border-color: #93c5fd;
}

select.gameSelect.lose {
  background: #fee2e2;
  color: #dc2626;
  border-color: #fca5a5;
}

select.gameSelect.empty {
  background: #f3f4f6;
  color: #9ca3af;
  border-color: #d1d5db;
}

.bonusWrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.bonusWrap label {
  font-size: 10px;
  color: #555;
}

.bonusWrap input[type="checkbox"] {
  width: 18px;
  height: 18px;
  margin: 0;
  accent-color: #2563eb;
}

.scoreBar {
  font-weight: bold;
  font-size: 16px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
}

.summary {
  white-space: pre-line;
  font-weight: bold;
  margin-bottom: 10px;
}

.result-card {
  border: 1px solid #ddd;
  border-radius: 12px;
  background: #fff;
  padding: 12px;
  margin-bottom: 10px;
}

.result-card.exact {
  border: 2px solid #16a34a;
  background: #f0fff4;
}

.result-card.near {
  border: 2px solid #f59e0b;
  background: #fffaf0;
}

.result-title {
  font-weight: bold;
  margin-bottom: 8px;
}

.meta {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  font-size: 13px;
  margin-bottom: 8px;
}

.patterns {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.chip {
  background: #eef2ff;
  border: 1px solid #c7d2fe;
  border-radius: 999px;
  padding: 4px 8px;
  font-family: monospace;
  font-size: 13px;
}

.emptyMessage {
  border: 1px dashed #ccc;
  border-radius: 10px;
  padding: 12px;
  color: #666;
  background: #fafafa;
}

@media (max-width: 700px) {
  .meta {
    grid-template-columns: 1fr;
  }

  .cell {
    width: 60px;
  }

  select.gameSelect {
    width: 56px;
    font-size: 14px;
  }

  .bonusWrap input[type="checkbox"] {
    width: 20px;
    height: 20px;
  }
}
</style>
</head>
<body>

<div class="wrap">
  <h3>残り9試合シミュレーター</h3>

  <div class="box">
    <div class="rowFlex">
      <div class="field">
        <label>現在の獲得点</label>
        <input type="number" id="baseScore" placeholder="">
      </div>

      <div class="field">
        <label>目標得点</label>
        <input type="number" id="targetScore" placeholder="">
      </div>
    </div>

    <div class="field" style="margin-top:10px;">
      <label>直近の勝敗</label>
      <select id="lastResult">
        <option value="win">勝ち</option>
        <option value="lose" selected>負け</option>
      </select>
    </div>
  </div>

  <div class="boardBox">
    <div class="boardRow" id="row1"></div>
    <div class="boardDivider"></div>
    <div class="boardRow" id="row2"></div>
    <div class="boardDivider"></div>
    <div class="boardRow" id="row3"></div>
  </div>

  <div class="scoreBar" id="scoreBar">累計得点: 0点</div>

  <button onclick="calculate()">残りパターン計算</button>

  <div class="box">
    <div id="summary" class="summary"></div>
    <div id="result"></div>
  </div>
</div>

<script>
const TOTAL = 9;
const ALLOW = 3;

function createCell(i) {
  const div = document.createElement("div");
  div.className = "cell";

  const select = document.createElement("select");
  select.className = "gameSelect empty";

  [
    { value: "", text: "未" },
    { value: "win", text: "○" },
    { value: "lose", text: "×" }
  ].forEach(v => {
    const opt = document.createElement("option");
    opt.value = v.value;
    opt.text = v.text;
    select.appendChild(opt);
  });

  select.onchange = () => {
    updateSelectStyle(select);
    updateScore();
  };

  const check = document.createElement("input");
  check.type = "checkbox";
  check.checked = true;
  check.onchange = updateScore;

  const label = document.createElement("label");
  label.textContent = "ボナp";

  const wrap = document.createElement("div");
  wrap.className = "bonusWrap";
  wrap.appendChild(check);
  wrap.appendChild(label);

  div.appendChild(select);
  div.appendChild(wrap);

  return div;
}

function updateSelectStyle(select) {
  select.classList.remove("win", "lose", "empty");
  if (select.value === "win") {
    select.classList.add("win");
  } else if (select.value === "lose") {
    select.classList.add("lose");
  } else {
    select.classList.add("empty");
  }
}

function init() {
  for (let i = 0; i < 3; i++) row1.appendChild(createCell(i));
  for (let i = 3; i < 6; i++) row2.appendChild(createCell(i));
  for (let i = 6; i < 9; i++) row3.appendChild(createCell(i));

  document.querySelectorAll(".gameSelect").forEach(updateSelectStyle);
}

function getResults() {
  return Array.from(document.querySelectorAll(".gameSelect")).map(e => e.value);
}

function getBonus() {
  return Array.from(document.querySelectorAll(".bonusWrap input")).map(e => e.checked ? 1 : 0);
}

function calcSeq(seq, bonus, last) {
  let score = 0;
  let prev = (last === "win");
  let winCount = 0;
  let streakBonus = 0;

  for (let i = 0; i < seq.length; i++) {
    if (bonus[i]) score += 1;

    if (seq[i] === "win") {
      score += 3;
      winCount += 1;

      if (prev) {
        score += 2;
        streakBonus += 2;
      }
      prev = true;
    } else if (seq[i] === "lose") {
      prev = false;
    }
  }

  return { score, winCount, streakBonus };
}

function updateScore() {
  const base = Number(baseScore.value) || 0;
  const res = getResults();
  const bon = getBonus();
  const last = lastResult.value;

  const filled = [];
  for (let r of res) {
    if (r === "") break;
    filled.push(r);
  }

  const calc = calcSeq(filled, bon, last);
  const total = base + calc.score;
  scoreBar.textContent = "累計得点: " + total + "点";
}

function calculate() {
  const base = Number(baseScore.value) || 0;
  const target = Number(targetScore.value) || 0;
  const res = getResults();
  const bon = getBonus();
  const last = lastResult.value;

  let fixed = [];
  for (let r of res) {
    if (r === "") break;
    fixed.push(r);
  }

  for (let i = fixed.length; i < res.length; i++) {
    if (res[i] !== "") {
      summary.textContent = "途中を空けて入力はできません";
      result.innerHTML = '<div class="emptyMessage">勝敗は左から順に入力してください。</div>';
      return;
    }
  }

  const fixedCalc = calcSeq(fixed, bon, last);
  const current = base + fixedCalc.score;
  scoreBar.textContent = "累計得点: " + current + "点";

  const remain = TOTAL - fixed.length;
  const total = Math.pow(2, remain);
  const remainBonus = bon.slice(fixed.length);
  const remainLast = fixed.length ? fixed[fixed.length - 1] : last;

  let grouped = new Map();
  let match = 0;

  for (let m = 0; m < total; m++) {
    let seq = [];
    for (let i = remain - 1; i >= 0; i--) {
      seq.push((m & (1 << i)) ? "win" : "lose");
    }

    const calc = calcSeq(seq, remainBonus, remainLast);
    const finalScore = current + calc.score;
    const diff = finalScore - target;

    if (Math.abs(diff) <= ALLOW) {
      match += 1;
      const key = calc.winCount + "_" + calc.streakBonus;

      if (!grouped.has(key)) {
        grouped.set(key, {
          finalScore,
          diff,
          gainedScore: calc.score,
          winCount: calc.winCount,
          streakBonus: calc.streakBonus,
          patterns: []
        });
      }

      grouped.get(key).patterns.push(
        seq.map(r => r === "win" ? "○" : "×").join("")
      );
    }
  }

  const groups = Array.from(grouped.values()).sort((a, b) => {
    const diffA = Math.abs(a.diff);
    const diffB = Math.abs(b.diff);
    if (diffA !== diffB) return diffA - diffB;
    if (a.winCount !== b.winCount) return a.winCount - b.winCount;
    if (a.streakBonus !== b.streakBonus) return a.streakBonus - b.streakBonus;
    return a.patterns.length - b.patterns.length;
  });

  summary.textContent =
    "総パターン数: " + total + "通り\n" +
    "一致パターン数: " + match + "通り\n" +
    "該当グループ: " + groups.length + "件\n" +
    "累計得点: " + current + "点 / 残り試合数: " + remain;

  if (groups.length === 0) {
    result.innerHTML = '<div class="emptyMessage">条件に合う組み合わせはありません。</div>';
    return;
  }

  let html = "";
  for (const group of groups) {
    const absDiff = Math.abs(group.diff);
    const diffText = group.diff > 0 ? "+" + group.diff : String(group.diff);

    let cardClass = "result-card";
    if (group.diff === 0) cardClass += " exact";
    else if (absDiff <= 1) cardClass += " near";

    const patternsHtml = group.patterns
      .sort()
      .map(p => `<span class="chip">${p || "残りなし"}</span>`)
      .join("");

    html += `
      <div class="${cardClass}">
        <div class="result-title">最終得点: ${group.finalScore}点</div>
        <div class="meta">
          <div>目標との差: <strong>${diffText}</strong></div>
          <div>残り試合の獲得点: <strong>${group.gainedScore}</strong></div>
          <div>残り試合の勝数: <strong>${group.winCount}</strong></div>
          <div>残り試合の連勝ボーナス: <strong>${group.streakBonus}</strong></div>
          <div>パターン数: <strong>${group.patterns.length}</strong></div>
          <div>表示範囲: <strong>目標値 ±3点</strong></div>
        </div>
        <div class="patterns">${patternsHtml}</div>
      </div>
    `;
  }

  result.innerHTML = html;
}

baseScore.addEventListener("input", updateScore);
lastResult.addEventListener("change", updateScore);

init();
updateScore();
summary.textContent = "条件を入力して計算してください。";
</script>

</body>
</html>
